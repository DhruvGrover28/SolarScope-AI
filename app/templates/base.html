<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or "Solar Rooftop Analyzer" }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <button id="theme-toggle" class="icon-button theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
  {% if show_header %}
    <header class="site-header">
      <div class="header-left">
        {% if avatar_url %}
          <img class="header-avatar" src="{{ avatar_url }}" alt="Profile avatar" />
        {% endif %}
        <div>
          <div class="header-name">{{ user_name or "" }}</div>
          <div class="header-subtitle">Solar analytics workspace</div>
        </div>
      </div>
      <div class="brand brand-center">SolarScope.AI</div>
      <div class="header-actions">
        <a class="icon-button" href="/settings" aria-label="Settings">⚙️</a>
        <form method="post" action="/logout" data-logout-form>
          <button class="button-secondary" type="submit">Logout</button>
        </form>
      </div>
    </header>
  {% endif %}
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <div id="logout-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <h3>Log out?</h3>
      <p>Are you sure you want to log out?</p>
      <div class="modal-actions">
        <button id="logout-confirm" class="button-secondary" type="button">Yes, logout</button>
        <button id="logout-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>
  <footer class="site-footer">
    <div>Built by Dhruv Grover</div>
    <a class="link" href="https://github.com/DhruvGrover28/" target="_blank">github.com/DhruvGrover28</a>
  </footer>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
